<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zencode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── ホーム画面：言語選択 ── -->
<div id="page-home" class="page">
    <div class="home-inner">
        <p class="home-subtitle">無心に打て</p>
        <h1 class="home-logo">zencode</h1>
        <p class="home-desc">コードの写経</p>
        <div class="lang-grid">
            <button class="lang-card" data-lang="python">
                <span class="lang-en">Python</span>
                <span class="lang-ja">基礎</span>
            </button>
            <button class="lang-card" data-lang="javascript">
                <span class="lang-en">JavaScript</span>
                <span class="lang-ja">動作</span>
            </button>
            <button class="lang-card" data-lang="typescript">
                <span class="lang-en">TypeScript</span>
                <span class="lang-ja">型</span>
            </button>
            <button class="lang-card" data-lang="sql">
                <span class="lang-en">SQL</span>
                <span class="lang-ja">問合</span>
            </button>
            <button class="lang-card" data-lang="html">
                <span class="lang-en">HTML</span>
                <span class="lang-ja">構造</span>
            </button>
            <button class="lang-card" data-lang="css">
                <span class="lang-en">CSS</span>
                <span class="lang-ja">装飾</span>
            </button>
        </div>
    </div>
</div>

<!-- ── タイピング画面 ── -->
<div id="page-typing" class="page" style="display:none; opacity:0;">
    <header class="header">
        <button class="back-btn" id="backBtn">← 戻る</button>
        <div class="logo">zencode</div>
        <div class="current-lang" id="currentLang"></div>
    </header>
    <main class="main">
        <div class="code-wrap" id="codeWrap" tabindex="0">
            <div class="code-text" id="codeText"></div>
            <div class="hint">クリックして入力開始</div>
        </div>
        <div class="footer">
            <div class="track"><div class="fill" id="fill"></div></div>
            <div class="counter" id="counter">0 / 0</div>
        </div>
        <div class="done-msg" id="doneMsg">完了。よくできました。</div>
        <div class="actions">
            <button class="action-btn" id="againBtn">── また打つ ──</button>
            <button class="action-btn" id="nextBtn">── 次のコード ──</button>
        </div>
    </main>
</div>

<script src="js/snippets/python.js"></script>
<script src="js/snippets/javascript.js"></script>
<script src="js/snippets/typescript.js"></script>
<script src="js/snippets/sql.js"></script>
<script src="js/snippets/html.js"></script>
<script src="js/snippets/css.js"></script>
<script src="js/app.js"></script>

</body>
</html>
